defaults:
  - experiment: debug_model_smoke
  - model/backbone: dummy
  - model/pooler: mean
  - dataset: dummy
  - _self_

project:
  name: die_vfm

run:
  output_root: runs
  run_name: null
  save_config_snapshot: true

system:
  seed: 42
  device: cpu
  num_workers: 4

train:
  max_epochs: 1
  log_every_n_steps: 10
  run_dataloader_smoke_test: true
  run_model_forward_smoke_test: true
  resume:
    enabled: false
    mode: full_resume
    checkpoint_path: null
    auto_resume_latest: false

evaluation:
  run_linear_probe: false
  run_knn: false

dataloader:
  batch_size: 4
  drop_last: false
  pin_memory: false
  persistent_workers: false

hydra:
  job:
    chdir: false