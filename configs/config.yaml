defaults:
  - experiment: debug_model_smoke
  - model/backbone: dummy
  - model/pooler: mean
  - dataset: dummy
  - artifact: embedding
  - evaluation: linear_probe
  - evaluation/knn
  - evaluation/centroid
  - evaluation/retrieval
  - _self_

project:
  name: die_vfm

run:
  output_root: runs
  run_name: null
  save_config_snapshot: true

system:
  seed: 42
  device: cpu
  num_workers: 4

train:
  num_epochs: 1
  freeze_backbone: false
  freeze_pooler: false
  selection_metric: knn.top1_accuracy
  log_every_n_steps: 10
  run_dataloader_smoke_test: true
  run_model_forward_smoke_test: true
  resume:
    enabled: false
    mode: full_resume
    checkpoint_path: null
    auto_resume_latest: false

evaluation:
  run_linear_probe: false
  run_knn: false
  run_centroid: false
  run_retrieval: false

artifact:
  embedding:
    enabled: true

dataloader:
  batch_size: 4
  drop_last: false
  pin_memory: false
  persistent_workers: false

hydra:
  job:
    chdir: false