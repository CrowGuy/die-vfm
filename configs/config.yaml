defaults:
  - _self_
  - experiment: debug_model_smoke
  - model/backbone: dummy
  - model/pooler: mean
  - dataset: dummy
  - artifact: embedding
  - evaluation: linear_probe
  - evaluation/knn
  - evaluation/centroid
  - evaluation/retrieval

project:
  name: die_vfm

run:
  output_root: runs
  run_name: null
  save_config_snapshot: true

system:
  seed: 42
  device: cpu
  num_workers: 4

train:
  # Transitional root train surface:
  # - `num_epochs`, `selection_metric`, and `resume` remain for bootstrap scope
  #   and current runtime compatibility
  # - they are not part of the formal `round1_frozen` single-shot contract
  num_epochs: 1
  freeze_backbone: false
  freeze_pooler: false
  update_mode: full_backbone
  last_n_blocks: null
  precision_mode: fp32
  selection_metric: knn.top1_accuracy
  log_every_n_steps: 10
  run_dataloader_smoke_test: true
  run_model_forward_smoke_test: true
  resume:
    enabled: false
    mode: full_resume
    checkpoint_path: null
    auto_resume_latest: false

evaluation:
  run_linear_probe: false
  run_knn: false
  run_centroid: false
  run_retrieval: false

round2:
  optimizer:
    name: adamw
    learning_rate: 0.0001
    weight_decay: 0.05
    betas: [0.9, 0.999]
  scheduler:
    name: cosine
    min_learning_rate: 0.000001
  ema:
    policy: fixed
    momentum: 0.996
    final_momentum: 0.999
  projector:
    hidden_dim: null
    output_dim: null
    num_layers: 2
  token_projector:
    hidden_dim: null
    output_dim: null
    num_layers: 2
  loss:
    token_loss_enabled: false
    token_loss_weight: 0.2
  augmentation:
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.5
  postprocess:
    mode: in_process
    checkpoint_path: null
    auto_use_latest_checkpoint: true
  distributed:
    strategy: ddp
    backend: null
    find_unused_parameters: false
  evaluation:
    cadence: end_only
    run_pair_benchmark: false
    run_slicing_analysis: false
    pair_benchmark:
      pair_candidates_path: null
      annotations_path: null
      join_key: did
      output_subdir: pair_benchmark
      hard_limit: 50
      map_location: cpu
      embedding_splits: [val]
    slicing:
      output_subdir: slicing
      confidences: [high, all]
      hard_limit: 20

artifact:
  embedding:
    enabled: true

dataloader:
  batch_size: 4
  drop_last: false
  pin_memory: false
  persistent_workers: false

hydra:
  job:
    chdir: false
