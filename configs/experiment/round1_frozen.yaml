# @package _global_

defaults:
  - override /hydra/job_logging: disabled
  - override /hydra/hydra_logging: disabled

run:
  run_name: round1_cifar10_4090_smoke

train:
  mode: round1_frozen
  num_epochs: 1
  freeze_backbone: true
  freeze_pooler: true
  selection_metric: knn.top1_accuracy
  resume:
    enabled: false
    checkpoint_path: null
    mode: full_resume
    auto_resume_latest: false

evaluation:
  run_linear_probe: true
  run_knn: true
  run_centroid: false
  run_retrieval: true

  linear_probe:
    input:
      normalize_embeddings: false
      map_location: cpu
    model:
      bias: true
    trainer:
      batch_size: 64
      num_epochs: 10
      learning_rate: 0.001
      weight_decay: 0.0
      optimizer_name: sgd
      momentum: 0.9
      device: cpu
      seed: 123
      selection_metric: accuracy
    output:
      save_predictions: true
      save_history: true

  knn:
    input:
      normalize_embeddings: false
      map_location: cpu
    evaluator:
      k: 5
      metric: cosine
      weighting: uniform
      temperature: 0.07
      batch_size: 128
      device: cpu
      topk: [1, 5]
    output:
      save_predictions: true

  retrieval:
    input:
      normalize_embeddings: false
      map_location: cpu