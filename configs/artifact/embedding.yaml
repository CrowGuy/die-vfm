# @package artifact.embedding

# Current runtime-effective fields in M1:
# - enabled
# - output_subdir
# - export_splits
# - include_test_split
#
# Current placeholder fields in M1:
# - save_labels
# - save_metadata
# - artifact_version
# - shard_size
#
# Placeholder fields are kept for future artifact evolution but do not currently
# change exporter behavior.

# Whether to enable embedding artifact export
enabled: true

# Subdirectory under run_dir
# Final path: runs/<run_name>/<output_subdir>/<split>/
output_subdir: embeddings

# Which splits to export
export_splits:
  - train
  - val

# Optional test split (explicit flag to avoid silent behavior)
include_test_split: false

# Placeholder in M1.
# Current exporter behavior always writes labels when the dataset provides them.
# This field does not yet change runtime behavior.
save_labels: true

# Placeholder in M1.
# Current exporter behavior always writes per-sample metadata.
# This field does not yet change runtime behavior.
save_metadata: true

# Placeholder in M1.
# The manifest version is currently controlled by runtime constants rather than
# this config field.
artifact_version: v1

# Placeholder in M1.
# Export currently writes a single shard only. This field is reserved for future
# sharded export support and does not yet change runtime behavior.
#
# Options:
#   null → single shard
#   int  → max samples per shard (future)
shard_size: null
