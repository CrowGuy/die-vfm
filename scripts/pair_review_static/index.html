<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pair Review Tool</title>
  <style>
    :root {
      --bg: #f2eee4;
      --panel: #fffaf1;
      --ink: #172021;
      --muted: #5d6768;
      --accent: #2d6a4f;
      --accent-soft: #d8f0e4;
      --line: #d7cfc0;
      --warn: #a44a3f;
      --shadow: 0 12px 30px rgba(23, 32, 33, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", serif;
      background:
        radial-gradient(circle at top left, #fdf7ea 0, #f2eee4 48%, #ebe4d7 100%);
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar,
    .content {
      padding: 20px;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(255, 250, 241, 0.92);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .sidebar .panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .subtitle,
    .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    select,
    input,
    textarea,
    button {
      font: inherit;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--ink);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .button-primary {
      background: var(--accent);
      color: white;
    }

    .button-secondary {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .button-warn {
      background: #f7d9d4;
      color: var(--warn);
    }

    .pair-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: calc(100vh - 320px);
      overflow: auto;
    }

    .pair-item {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid transparent;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.72);
      cursor: pointer;
    }

    .pair-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .pair-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .content {
      display: grid;
      gap: 16px;
      grid-template-rows: auto auto 1fr auto;
    }

    .content .panel {
      padding: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .progress {
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .image-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: white;
    }

    .image-card header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #f7f1e6;
      font-weight: 700;
    }

    .image-card img {
      display: block;
      width: 100%;
      min-height: 320px;
      max-height: 65vh;
      object-fit: contain;
      background: #f7f7f7;
    }

    .image-meta,
    .pair-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
      font-size: 14px;
    }

    .meta-block {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 10px;
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      background: #f4efe4;
      color: var(--muted);
    }

    .status-pill.reviewed {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .status-pill.skipped {
      background: #f7d9d4;
      color: var(--warn);
    }

    .empty-state {
      padding: 30px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .pair-list {
        max-height: 260px;
      }

      .image-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="panel">
        <h1 class="title">Pair Review</h1>
        <p class="subtitle">Review pair candidates, label visual relation, and write results back to <code>annotations.csv</code>.</p>

        <div>
          <label for="reviewStatusFilter">Review Status Filter</label>
          <select id="reviewStatusFilter">
            <option value="pending">Pending</option>
            <option value="all">All</option>
            <option value="reviewed">Reviewed</option>
            <option value="skipped">Skipped</option>
          </select>
        </div>

        <div class="button-row">
          <button class="button-primary" id="refreshButton" type="button">Refresh</button>
          <button class="button-secondary" id="prevButton" type="button">Prev</button>
          <button class="button-secondary" id="nextButton" type="button">Next</button>
        </div>
      </div>

      <div class="panel">
        <div id="summaryBlock" class="muted">Loading summary...</div>
      </div>

      <div class="panel">
        <ul id="pairList" class="pair-list"></ul>
      </div>
    </aside>

    <main class="content">
      <section class="panel topbar">
        <div>
          <div id="currentPairTitle"><strong>No pair selected</strong></div>
          <div id="currentPairProgress" class="progress"></div>
        </div>
        <div id="currentPairStatus" class="status-pill">pending</div>
      </section>

      <section class="panel">
        <div class="pair-meta" id="pairMeta"></div>
      </section>

      <section class="panel">
        <div class="image-grid">
          <article class="image-card">
            <header>Image A</header>
            <img id="imageA" alt="Pair image A">
            <div class="meta-block image-meta" id="imageMetaA"></div>
          </article>

          <article class="image-card">
            <header>Image B</header>
            <img id="imageB" alt="Pair image B">
            <div class="meta-block image-meta" id="imageMetaB"></div>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="image-grid">
          <div>
            <label for="annotatorInput">Annotator</label>
            <input id="annotatorInput" type="text" placeholder="your name">
          </div>
          <div>
            <label for="confidenceSelect">Confidence</label>
            <select id="confidenceSelect">
              <option value="">Unset</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>

        <div style="margin-top: 12px;">
          <label for="notesInput">Notes</label>
          <textarea id="notesInput" placeholder="free-form notes"></textarea>
        </div>

        <div class="button-row">
          <button class="button-primary" id="sameButton" type="button">Same (1)</button>
          <button class="button-primary" id="differentButton" type="button">Different (2)</button>
          <button class="button-primary" id="uncertainButton" type="button">Uncertain (3)</button>
          <button class="button-warn" id="skipButton" type="button">Skip (S)</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      items: [],
      currentIndex: 0,
      currentPair: null,
      filter: "pending",
    };

    const reviewStatusFilter = document.getElementById("reviewStatusFilter");
    const refreshButton = document.getElementById("refreshButton");
    const prevButton = document.getElementById("prevButton");
    const nextButton = document.getElementById("nextButton");
    const pairList = document.getElementById("pairList");
    const summaryBlock = document.getElementById("summaryBlock");
    const currentPairTitle = document.getElementById("currentPairTitle");
    const currentPairProgress = document.getElementById("currentPairProgress");
    const currentPairStatus = document.getElementById("currentPairStatus");
    const pairMeta = document.getElementById("pairMeta");
    const imageA = document.getElementById("imageA");
    const imageB = document.getElementById("imageB");
    const imageMetaA = document.getElementById("imageMetaA");
    const imageMetaB = document.getElementById("imageMetaB");
    const annotatorInput = document.getElementById("annotatorInput");
    const confidenceSelect = document.getElementById("confidenceSelect");
    const notesInput = document.getElementById("notesInput");
    const sameButton = document.getElementById("sameButton");
    const differentButton = document.getElementById("differentButton");
    const uncertainButton = document.getElementById("uncertainButton");
    const skipButton = document.getElementById("skipButton");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function statusPillClass(status) {
      if (status === "reviewed") return "status-pill reviewed";
      if (status === "skipped") return "status-pill skipped";
      return "status-pill";
    }

    function currentPairId() {
      if (!state.items.length) return null;
      return state.items[state.currentIndex]?.pair_id ?? null;
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) {
        const payload = await response.json().catch(() => ({ detail: "Request failed" }));
        throw new Error(payload.detail || "Request failed");
      }
      return response.json();
    }

    function renderSummary(summary) {
      const counts = summary.review_status_counts;
      const pairTypes = Object.entries(summary.pair_type_counts)
        .map(([key, value]) => `${key}: ${value}`)
        .join("<br>");

      summaryBlock.innerHTML = `
        <strong>Total pairs:</strong> ${summary.total_pairs}<br>
        <strong>Pending:</strong> ${counts.pending}<br>
        <strong>Reviewed:</strong> ${counts.reviewed}<br>
        <strong>Skipped:</strong> ${counts.skipped}<br><br>
        <strong>Pair types</strong><br>${pairTypes}<br><br>
        <strong>Pairs CSV</strong><br><span class="muted">${escapeHtml(summary.pair_candidates_path)}</span><br><br>
        <strong>Annotations CSV</strong><br><span class="muted">${escapeHtml(summary.annotations_path)}</span>
      `;
    }

    function renderPairList() {
      if (!state.items.length) {
        pairList.innerHTML = `<li class="empty-state">No pairs in this filter.</li>`;
        return;
      }

      pairList.innerHTML = state.items.map((item, index) => `
        <li class="pair-item ${index === state.currentIndex ? "active" : ""}" data-index="${index}">
          <strong>${escapeHtml(item.pair_id)}</strong>
          <div>${escapeHtml(item.fine_label_a)} ↔ ${escapeHtml(item.fine_label_b)}</div>
          <div class="muted">${escapeHtml(item.pair_type)}</div>
          <div class="muted">${escapeHtml(item.review_status)} ${item.visual_relation ? `· ${escapeHtml(item.visual_relation)}` : ""}</div>
        </li>
      `).join("");

      for (const node of pairList.querySelectorAll(".pair-item")) {
        node.addEventListener("click", () => {
          state.currentIndex = Number(node.dataset.index);
          loadCurrentPair();
        });
      }
    }

    function renderMetaBlock(target, entries) {
      target.innerHTML = entries.map(([label, value]) => `
        <div>
          <div class="meta-label">${escapeHtml(label)}</div>
          <div>${escapeHtml(value)}</div>
        </div>
      `).join("");
    }

    function renderCurrentPair(pair) {
      state.currentPair = pair;
      currentPairTitle.innerHTML = `<strong>${escapeHtml(pair.pair_id)}</strong>`;
      currentPairProgress.textContent = `${state.items.length ? state.currentIndex + 1 : 0} / ${state.items.length} visible pairs`;
      currentPairStatus.className = statusPillClass(pair.review_status);
      currentPairStatus.textContent = pair.review_status + (pair.visual_relation ? ` · ${pair.visual_relation}` : "");

      renderMetaBlock(pairMeta, [
        ["Pair type", pair.pair_type],
        ["Candidate source", pair.candidate_source],
        ["Same fine label", pair.same_fine_label],
        ["Same lot", pair.same_lot],
        ["Same machine", pair.same_machine],
        ["Same time bucket", pair.same_time_bucket],
      ]);

      imageA.src = pair.image_url_a;
      imageB.src = pair.image_url_b;

      renderMetaBlock(imageMetaA, [
        ["DID", pair.did_a],
        ["Image ID", pair.image_id_a],
        ["Fine label", pair.fine_label_a],
        ["Freq bin", pair.freq_bin_a],
        ["Lot", pair.lot_a],
        ["Machine", pair.machine_a],
        ["Time bucket", pair.time_bucket_a],
      ]);

      renderMetaBlock(imageMetaB, [
        ["DID", pair.did_b],
        ["Image ID", pair.image_id_b],
        ["Fine label", pair.fine_label_b],
        ["Freq bin", pair.freq_bin_b],
        ["Lot", pair.lot_b],
        ["Machine", pair.machine_b],
        ["Time bucket", pair.time_bucket_b],
      ]);

      annotatorInput.value = pair.annotator || "";
      confidenceSelect.value = pair.confidence || "";
      notesInput.value = pair.notes || "";
      renderPairList();
    }

    async function loadSummary() {
      const summary = await fetchJson("/api/summary");
      renderSummary(summary);
    }

    async function loadItems(preservePairId = null) {
      const response = await fetchJson(`/api/pairs?review_status=${encodeURIComponent(state.filter)}`);
      state.items = response.items;

      if (!state.items.length) {
        state.currentIndex = 0;
        state.currentPair = null;
        renderPairList();
        currentPairTitle.innerHTML = "<strong>No pair selected</strong>";
        currentPairProgress.textContent = "";
        currentPairStatus.className = "status-pill";
        currentPairStatus.textContent = "pending";
        pairMeta.innerHTML = "";
        imageMetaA.innerHTML = "";
        imageMetaB.innerHTML = "";
        imageA.removeAttribute("src");
        imageB.removeAttribute("src");
        return;
      }

      if (preservePairId) {
        const index = state.items.findIndex((item) => item.pair_id === preservePairId);
        state.currentIndex = index >= 0 ? index : Math.min(state.currentIndex, state.items.length - 1);
      } else {
        state.currentIndex = Math.min(state.currentIndex, state.items.length - 1);
      }

      renderPairList();
      await loadCurrentPair();
    }

    async function loadCurrentPair() {
      const pairId = currentPairId();
      if (!pairId) return;
      const pair = await fetchJson(`/api/pairs/${encodeURIComponent(pairId)}`);
      renderCurrentPair(pair);
    }

    async function saveReview(reviewStatus, visualRelation) {
      const pairId = currentPairId();
      if (!pairId) return;

      const payload = {
        review_status: reviewStatus,
        visual_relation: visualRelation,
        confidence: confidenceSelect.value || null,
        annotator: annotatorInput.value,
        notes: notesInput.value,
      };

      await fetchJson(`/api/annotations/${encodeURIComponent(pairId)}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      });

      await loadSummary();
      await loadItems(pairId);
    }

    reviewStatusFilter.addEventListener("change", async () => {
      state.filter = reviewStatusFilter.value;
      await loadItems();
    });

    refreshButton.addEventListener("click", async () => {
      await loadSummary();
      await loadItems(currentPairId());
    });

    prevButton.addEventListener("click", async () => {
      if (!state.items.length) return;
      state.currentIndex = Math.max(0, state.currentIndex - 1);
      await loadCurrentPair();
    });

    nextButton.addEventListener("click", async () => {
      if (!state.items.length) return;
      state.currentIndex = Math.min(state.items.length - 1, state.currentIndex + 1);
      await loadCurrentPair();
    });

    sameButton.addEventListener("click", () => saveReview("reviewed", "same"));
    differentButton.addEventListener("click", () => saveReview("reviewed", "different"));
    uncertainButton.addEventListener("click", () => saveReview("reviewed", "uncertain"));
    skipButton.addEventListener("click", () => saveReview("skipped", null));

    window.addEventListener("keydown", async (event) => {
      if (event.target && ["INPUT", "TEXTAREA", "SELECT"].includes(event.target.tagName)) {
        return;
      }

      if (event.key === "1") await saveReview("reviewed", "same");
      if (event.key === "2") await saveReview("reviewed", "different");
      if (event.key === "3") await saveReview("reviewed", "uncertain");
      if (event.key.toLowerCase() === "s") await saveReview("skipped", null);
      if (event.key === "ArrowLeft") {
        state.currentIndex = Math.max(0, state.currentIndex - 1);
        await loadCurrentPair();
      }
      if (event.key === "ArrowRight") {
        state.currentIndex = Math.min(state.items.length - 1, state.currentIndex + 1);
        await loadCurrentPair();
      }
    });

    async function bootstrap() {
      reviewStatusFilter.value = state.filter;
      await loadSummary();
      await loadItems();
    }

    bootstrap().catch((error) => {
      summaryBlock.textContent = error.message;
    });
  </script>
</body>
</html>
